<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission | Nanai Paria High School</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="dark-theme">

    <nav class="navbar navbar-expand-lg fixed-top glass-nav">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fa-solid fa-school"></i> NPHS
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto text-center">
                    <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="academics.html">Academics</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="faculty.html">Faculty</a></li>
                    <li class="nav-item"><a class="nav-link active" href="admission.html">Admission</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="container" style="padding-top:140px; padding-bottom:80px;">
        <div class="text-center mb-5">
            <h1 class="fw-bold glow-text">Student Admission</h1>
            <p class="opacity-75">Start your journey with us. Fill out the form to apply online.</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-9">
                <div class="neo-card text-start">
                    
                    <form action="https://formspree.io/f/mykdbjvk" method="POST" id="admissionForm">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-info">Full Name of Student</label>
                                <input type="text" name="Student Name" class="form-control" placeholder="Enter student name" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-info">Father’s Name</label>
                                <input type="text" name="Father Name" class="form-control" placeholder="Enter father's name" required>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-info">Class Applying For</label>
                                <select name="Applying For Class" class="form-select" required>
                                    <option value="" selected disabled>Choose Class</option>
                                    <option value="Class 6">Class 6</option>
                                    <option value="Class 7">Class 7</option>
                                    <option value="Class 8">Class 8</option>
                                    <option value="Class 9">Class 9</option>
                                    <option value="Class 10">Class 10</option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-info">Mobile Number</label>
                                <input type="tel" name="Mobile Number" class="form-control" placeholder="+91" required>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-info">Email Address</label>
                                <input type="email" name="_replyto" class="form-control" placeholder="email@example.com">
                            </div>

                            <div class="col-12">
                                <label class="form-label small fw-bold text-info">Residential Address</label>
                                <textarea name="Address" class="form-control" rows="3" placeholder="Full address details..."></textarea>
                            </div>

                            <input type="text" name="_gotcha" style="display:none">

                            <div class="col-12 mt-4 text-center">
                                <button type="submit" class="btn btn-glow w-100 py-3">
                                    <i class="fa-solid fa-paper-plane me-2"></i> Submit Application
                                </button>
                            </div>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </section>

    <footer class="footer text-center">
        <div class="container">
            <p>© 2026 Nanai Paria High School | Designed by <span class="text-info">Tarique Izaz</span></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
